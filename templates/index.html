<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.2rem;
        }
        .video-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        img {
            width: 100%;
            display: block;
        }
        .status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .instructions {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .instructions h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .step {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .step-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Sign Language Recognition</h1>
    <p class="subtitle">Real-time Alphabet & Word Detection with AI Narration</p>
    
    <div class="video-container">
        <div class="video-wrapper">
            <img src="/video" alt="Video Feed">
        </div>
        <div class="status">
            <div class="status-item">
                <span class="status-dot"></span>
                <span>Live Feed Active</span>
            </div>
            <div class="status-item">
                <strong>Mode:</strong> WORD Detection
            </div>
        </div>
    </div>

    <div class="instructions">
        <h2>How to Use</h2>
        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <p>Position your hand in front of the camera</p>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <p>Show a sign language gesture</p>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <p>Hold steady for 0.5-1 second</p>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <p>System detects and speaks the result</p>
            </div>
        </div>
    </div>
</body>
</html>
